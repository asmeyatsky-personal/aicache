name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy src/aicache/domain src/aicache/application
        continue-on-error: true  # warn-only in Phase 0; blocking in Phase 1 after hex rewire

      - name: Import boundaries (import-linter, §2)
        run: lint-imports

      - name: Supply chain audit (pip-audit)
        run: pip-audit --strict --ignore-vuln GHSA-4xh5-x5gv-qwph  # placeholder; remove when no vulns pinned
        continue-on-error: true  # warn-only in Phase 0; harden in Phase 5

      - name: Tests + coverage gate
        run: pytest --cov --cov-report=term-missing --cov-fail-under=50
